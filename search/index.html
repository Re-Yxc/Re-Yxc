  function getCurrentPosition() {

      navigator.geolocation.getCurrentPosition(resolve, reject, {

        timeout: 8000,
        maximumAge: 30 * 60 * 1000,

  async function fetchWeatherByGeolocation() {

    const cities = LOCAL_CITY_OPTIONS.filter((city) => {

    console.log("[weather-widget] search result", { keyword, cities });

    if (cities.length === 0) {

      setResults([]);

  function applyWeatherPanelState(isOpen) {

      modal.style.display = 'block';
      requestAnimationFrame(() => {
        modal.classList.add('widget-panel-open');
        modal.classList.remove('widget-panel-close');

      isWeatherPanelOpen = true;

    }

    modal.classList.remove('widget-panel-open');
    modal.classList.add('widget-panel-close');
    weatherHideTimer = window.setTimeout(() => {
      modal.style.display = 'none';
      modal.classList.remove('widget-panel-close');
      weatherHideTimer = null;

  function bindSearchResults() {

        adm1: option.getAttribute("data-city-adm1") || "",

  function bindWidgetEvents() {

    if (input && input.dataset.bound !== "true") {

  let player = null;
  let isPlaying = false;
  let currentVolume = 80;
  let progressInterval = null;
  let isMusicPanelOpen = false;
  let musicHideTimer = null;

  function formatTime(seconds) {
    if (isNaN(seconds)) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  function updateProgress() {
    if (!player) return;
    const currentTime = player.audio.currentTime || 0;
    const duration = player.audio.duration || 0;
    const progress = duration > 0 ? (currentTime / duration) * 100 : 0;

    document.getElementById('music-progress').style.width = `${progress}%`;
    document.getElementById('music-current-time').textContent = formatTime(currentTime);
    document.getElementById('music-duration').textContent = formatTime(duration);
  }

  function initPlayer() {
    if (window.player) {
      player = window.player;
      return;
    }

    let container = document.getElementById('music-audio-player');
    if (!container) {
      container = document.createElement('div');
      container.id = 'music-audio-player';
      container.style.display = 'none';
      document.body.appendChild(container);
    }

    let playlist = playlistData;

    if (!playlist || playlist.length === 0) {
      playlist = [
        {
          name: '测试歌曲',
          artist: '测试歌手',
          url: 'https://music.163.com/song/media/outer/url?id=1330348068.mp3',
          cover: 'https://p1.music.126.net/6y-UleORITEDbvrOLV0Q8A==/5639395138885805.jpg',
          lrc: ''
        }
      ];
    }

    const savedIndex = sessionStorage.getItem('musicCurrentIndex');
    const savedList = sessionStorage.getItem('musicPlaylist');

    if (savedList) {
      try {
        playlist = JSON.parse(savedList);
      } catch (e) {
        console.error('Failed to parse saved playlist:', e);
      }
    }

    try {
      player = new window.APlayer({
        container: container,
        audio: playlist,
        autoplay: false,
        theme: '#f97316',
        loop: 'all',
        order: 'list',
        preload: 'metadata',
        volume: 0.8,
        mutex: true,
        listFolded: true,
      });
      window.player = player;

      if (savedIndex !== null && savedIndex !== 'null') {
        const index = parseInt(savedIndex, 10);
        if (!isNaN(index) && index >= 0 && index < playlist.length) {
          player.list.switch(index);
          updateSongInfo(index);
        }
      }

      const savedIsPlaying = sessionStorage.getItem('musicIsPlaying');
      if (savedIsPlaying === 'true') {
        setTimeout(() => {
          if (player) {
            player.play();
          }
        }, 100);
      }

      player.on('play', () => {
        isPlaying = true;
        sessionStorage.setItem('musicIsPlaying', 'true');
        updatePlayButton();
        startProgressUpdate();
      });

      player.on('pause', () => {
        isPlaying = false;
        sessionStorage.setItem('musicIsPlaying', 'false');
        updatePlayButton();
        stopProgressUpdate();
      });

      player.on('ended', () => {
        isPlaying = false;
        sessionStorage.setItem('musicIsPlaying', 'false');
        updatePlayButton();
        stopProgressUpdate();
      });

      player.on('listswitch', (data) => {
        updateSongInfo(data.index);
      });

      player.on('loadedmetadata', () => {
        updateProgress();
      });

      if (playlist.length > 0) {
        updateSongInfo(0);
      }
    } catch (error) {
      console.error('Failed to create APlayer:', error);
    }
  }

  function updatePlayButton() {
    const playIcon = document.getElementById('music-play-icon');
    const pauseIcon = document.getElementById('music-pause-icon');
    const currentlyPlaying = player ? !player.paused : isPlaying;
    if (currentlyPlaying) {
      playIcon?.classList.add('hidden');
      pauseIcon?.classList.remove('hidden');
    } else {
      playIcon?.classList.remove('hidden');
      pauseIcon?.classList.add('hidden');
    }
  }

  function updateSongInfo(index) {
    if (!player || !player.list.audios[index]) return;
    const audio = player.list.audios[index];
    document.getElementById('music-title').textContent = audio.name || '未知歌曲';
    document.getElementById('music-artist').textContent = audio.artist || '未知歌手';

    const coverEl = document.getElementById('music-cover');
    if (audio.cover) {
      coverEl.innerHTML = `<img src="${audio.cover}" class="h-full w-full object-cover" alt="cover">`;
    }

    sessionStorage.setItem('musicCurrentIndex', index.toString());
    sessionStorage.setItem('musicPlaylist', JSON.stringify(player.list.audios));
  }

  function startProgressUpdate() {
    stopProgressUpdate();
    progressInterval = setInterval(updateProgress, 100);
  }

  function stopProgressUpdate() {
    if (progressInterval) {
      clearInterval(progressInterval);
      progressInterval = null;
    }
  }

  function applyMusicPanelState(isOpen) {
    const modal = document.getElementById('music-player-modal');
    if (!modal) return;

    if (musicHideTimer) {
      clearTimeout(musicHideTimer);
      musicHideTimer = null;
    }

    if (isOpen) {
      modal.style.display = 'block';
      requestAnimationFrame(() => {
        modal.classList.add('widget-panel-open');
        modal.classList.remove('widget-panel-close');
      });
      isMusicPanelOpen = true;
      window.setToolbarActive?.('music');
      return;
    }

    modal.classList.remove('widget-panel-open');
    modal.classList.add('widget-panel-close');
    musicHideTimer = window.setTimeout(() => {
      modal.style.display = 'none';
      modal.classList.remove('widget-panel-close');
      musicHideTimer = null;
    }, 260);
    isMusicPanelOpen = false;
    window.setToolbarActive?.(null);
  }

  function showMusicPlayer() {
    const modal = document.getElementById('music-player-modal');
    if (modal && window.innerWidth >= 768) {
      applyMusicPanelState(true);
    }
  }

  function hideMusicPlayer() {
    applyMusicPanelState(false);
  }

  function initMusicPlayer() {
    const container = document.getElementById('music-audio-player');

    if (window.player) {
      player = window.player;
      isPlaying = !player.paused;
      const currentIndex = player.list.index;
      updateSongInfo(currentIndex);
      updatePlayButton();
      if (isPlaying) {
        startProgressUpdate();
      }
    } else if (!container) {
      initPlayer();
    }
  }

  function bindControls() {
    const playBtn = document.getElementById('music-play-btn');
    if (playBtn && playBtn.dataset.bound !== 'true') {
      playBtn.addEventListener('click', () => {
        if (!player) return;
        if (isPlaying) {
          player.pause();
        } else {
          player.play();
        }
      });
      playBtn.dataset.bound = 'true';
    }

    const prevBtn = document.getElementById('music-prev-btn');
    if (prevBtn && prevBtn.dataset.bound !== 'true') {
      prevBtn.addEventListener('click', () => {
        if (player) player.skipBack();
      });
      prevBtn.dataset.bound = 'true';
    }

    const nextBtn = document.getElementById('music-next-btn');
    if (nextBtn && nextBtn.dataset.bound !== 'true') {
      nextBtn.addEventListener('click', () => {
        if (player) player.skipForward();
      });
      nextBtn.dataset.bound = 'true';
    }

    const closeBtn = document.getElementById('music-close-btn');
    if (closeBtn && closeBtn.dataset.bound !== 'true') {
      closeBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        hideMusicPlayer();
      });
      closeBtn.dataset.bound = 'true';
    }

    const volumeSlider = document.getElementById('music-volume-slider');
    if (volumeSlider && volumeSlider.dataset.bound !== 'true') {
      volumeSlider.addEventListener('input', (e) => {
        if (!player) return;
        const volume = e.target.value / 100;
        player.volume(volume);
        currentVolume = e.target.value;
        updateVolumeIcon(volume);
      });
      volumeSlider.dataset.bound = 'true';
    }

    const muteBtn = document.getElementById('music-mute-btn');
    if (muteBtn && muteBtn.dataset.bound !== 'true') {
      muteBtn.addEventListener('click', () => {
        if (!player) return;
        const currentVol = player.volume();
        if (currentVol > 0) {
          player.volume(0);
          updateVolumeIcon(0);
          if (volumeSlider) volumeSlider.value = 0;
        } else {
          player.volume(currentVolume / 100);
          updateVolumeIcon(currentVolume / 100);
          if (volumeSlider) volumeSlider.value = currentVolume;
        }
      });
      muteBtn.dataset.bound = 'true';
    }

    const progressBar = document.getElementById('music-progress-bar');
    if (progressBar && progressBar.dataset.bound !== 'true') {
      progressBar.addEventListener('click', (e) => {
        if (!player) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        const duration = player.audio.duration || 0;
        player.seek(duration * percent);
      });
      progressBar.dataset.bound = 'true';
    }
  }

  function updateVolumeIcon(volume) {
    const volumeIcon = document.getElementById('music-volume-icon');
    const muteIcon = document.getElementById('music-mute-icon');
    if (volume === 0) {
      volumeIcon?.classList.add('hidden');
      muteIcon?.classList.remove('hidden');
    } else {
      volumeIcon?.classList.remove('hidden');
      muteIcon?.classList.add('hidden');
    }
  }

  function waitForAPlayer(callback) {
    if (typeof window.APlayer !== 'undefined') {
      callback();
    } else {
      setTimeout(() => waitForAPlayer(callback), 100);
    }
  }

  function initMusicWidget() {
    waitForAPlayer(() => {
      bindControls();
      initMusicPlayer();
      hideMusicPlayer();
    });
  }

  document.addEventListener('DOMContentLoaded', initMusicWidget);
  document.addEventListener('astro:page-load', initMusicWidget);

  window.toggleMusicPlayer = function() {
    if (isMusicPanelOpen) {
      hideMusicPlayer();
      return;
    }
    showMusicPlayer();
    initMusicPlayer();
    window.hideWeatherWidget?.(true);
  };

  window.hideMusicPlayer = hideMusicPlayer;

  const defaultTheme = "system";

    var darkMode = defaultTheme === "dark" ? true : false;

      if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        darkMode = true;
      }
    } else if (localStorage.getItem("theme") === "dark") {
      darkMode = true;
    } else if (localStorage.getItem("theme") === "light") {
      darkMode = false;
    }
    return darkMode;
  }

  function setTheme(darkMode) {
    // Update DOM
    darkMode
      ? document.documentElement.classList.add("dark")
      : document.documentElement.classList.remove("dark");
    // Update localStorage
    localStorage.setItem("theme", darkMode ? "dark" : "light");
  }

  // This prevents flickering back to default theme before the page is fully loaded
  setTheme(getTheme(defaultTheme));

  document.addEventListener("astro:page-load", () => {
    setTheme(getTheme(defaultTheme));
    // Theme switcher
    var themeSwitch = document.querySelectorAll("[data-theme-switcher]");
    themeSwitch.forEach((el) => {
      el.addEventListener("change", (e) => {
        setTheme(e.target.checked);
      });
    });
  });

 克隆仓库  \n   ```bash\n   git clone https://github.com/Re-Yxc/Re-Yxc.git\n   cd Re-YxcBlog\n   ```\n\n2. 安装依赖  \n   ```bash\n   npm install\n   ```\n\n3. 本地启动  \n   ```bash\n   npm run dev\n   ```\n   浏览器访问 `http://localhost:4321` 即可实时预览。\n\n4. 新建文章  \n   在 `src/content/blog/` 目录下新建 `.md` 文件，Frontmatter 模板如下：\n\n   ```yaml\n   ---\n   title: 文章标题\n   description: 一句话描述\n   createdAt: 2026-04-29\n   updatedAt: 2026-04-29\n   categories:\n     - 示例分类\n   author: 你的昵称\n   image: \&quot;@assets/demo.png\&quot;\n   tags:\n     - 示例标签\n   draft: false\n   hideToc: false\n   ---\n   ```\n\n5. 撰写正文  \n   使用标准 Markdown 语法，支持：\n\n   - 代码高亮\n   - 数学公式（KaTeX）\n   - Mermaid 流程图\n   - 自定义组件（`&lt;Image /&gt;`、`&lt;Video /&gt;` 等）\n\n6. 构建与部署  \n   ```bash\n   npm run build\n   ```\n   生成的 `dist/` 目录可直接上传至任意静态托管平台（Vercel、Netlify、GitHub Pages…）。\n\n## 特色功能\n\n- 📝 容管理：博客、笔记、页面、友链、首页卡片\n- 💬 评论系统：集成 Twikoo，支持多平台评论管理\n- 👥 友链系统：支持本地 JSON 配置（`public/data/friends.json`）\n- 🔍 全文搜索：基于 Astro 内容构建的本地搜索\n- 🌓 深色/浅色模式：可切换深色或浅色模式\n- 📱 响应式设计：适配桌面、平板、手机多端\n- ⚡ 高性能：静态生成 + 边缘缓存，首屏极速加载\n\n\n## 结语\n\nRe-YxcBlog 二次开发\n---  \n*最后更新：2026-04-29*&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/示例文章.md&quot;],&quot;assetImports&quot;:[1,[[0,&quot;@assets/uploads/demo.jpg&quot;]]],&quot;digest&quot;:[0,&quot;9b30ad1b130df9d4&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;h1 id=\&quot;示例文章\&quot;&gt;示例文章&lt;/h1&gt;\n&lt;blockquote&gt;\n&lt;p&gt;本文是默认示例，帮助你快速了解如何使用本系统发布内容。&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\&quot;项目简介\&quot;&gt;项目简介&lt;/h2&gt;\n&lt;p&gt;Re-YxcBlog 是一款轻量级、开源的内容管理系统，专为个人博客、文档站点与小团队协作设计。它基于 Astro 构建，天然支持 Markdown、组件化布局与静态生成，让写作与部署都变得无比简单。&lt;/p&gt;\n&lt;h2 id=\&quot;快速开始\&quot;&gt;快速开始&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;克隆仓库&lt;/p&gt;\n&lt;pre class=\&quot;astro-code astro-code-themes github-light github-dark-dimmed\&quot; style=\&quot;background-color:#fff;--shiki-dark-bg:#22272e;color:#24292e;--shiki-dark:#adbac7; overflow-x: auto;\&quot; tabindex=\&quot;0\&qu lse],&quot;views&quot;:[0,0],&quot;hideToc&quot;:[0,false]}],&quot;body&quot;:[0,&quot;# Python 基础\r\n\r\n## 目录\r\n1. [项目结构](#项目结构)\r\n2. [基础语法](#基础语法)\r\n3. [数据类型](#数据类型)\r\n4. [流程控制](#流程控制)\r\n5. [函数](#函数)\r\n6. [面向对象编程](#面向对象编程)\r\n7. [异常处理](#异常处理)\r\n8. [模块化编程](#模块化编程)\r\n9. [实战项目：KFC点餐系统](#实战项目kfc点餐系统)\r\n\r\n---\r\n\r\n## 项目结构\r\n\r\n```\r\npython/\r\n├── python0-1.py          # Python基础语法学习笔记\r\n├── kfc_order/            # KFC点餐系统项目\r\n│   ├── order.py          # 主程序入口\r\n│   ├── order_menu.py     # 菜单类模块\r\n│   └── judge.py          # 星期判断类模块\r\n```\r\n\r\n---\r\n\r\n## 基础语法\r\n\r\n### 1. 打印输出\r\n```python\r\nprint(\&quot;Hello, World!\&quot;)\r\n```\r\n\r\n### 2. 注释\r\n```python\r\n# 井号是单行注释 (快捷键: Ctrl+/)\r\n\r\n\&quot;\&quot;\&quot;\r\n三个引号包裹是多行注释\r\n可以写多行内容\r\n\&quot;\&quot;\&quot;\r\n```\r\n\r\n### 3. 代码格式化快捷键\r\n```\r\nCtrl + Alt + L  # 自动格式化代码\r\n```\r\n\r\n---\r\n\r\n## 数据类型\r\n\r\n### 1. 基本数据类型\r\n\r\n| 类型 | 示例 | 说明 |\r\n|------|------|------|\r\n| 字符串 (str) | `name = \&quot;小明\&quot;` | 文本数据 |\r\n| 整数 (int) | `age = 18` | 整数值 |\r\n| 浮点数 (float) | `height = 1.75` | 小数值 |\r\n| 布尔值 (bool) | `is_student = True` | True/False |\r\n| 空值 (None) | `customer = None` | 表示无值 |\r\n\r\n### 2. 列表 (List)\r\n列表使用方括号 `[]`，元素可修改，可重复。\r\n\r\n```python\r\nmenu = [\&quot;汉堡\&quot;, 20, \&quot;薯条\&quot;, 10, \&quot;可乐\&quot;, 5]\r\n\r\n# 常用操作\r\nmenu.append(\&quot;鸡米花\&quot;)    # 在末尾添加元素\r\nmenu.append(12)\r\ndel menu[0]              # 删除指定索引的元素\r\nlen(menu)                # 获取列表长度\r\n\r\n# 字符串格式化输出\r\nprint(f\&quot;{menu[0]}: {menu[1]}元\&quot;)  # f-string方式\r\nprint(\&quot;%s:%d元\&quot; % (menu[0], menu[1]))  # %占位符方式\r\n```\r\n\r\n### 3. 元组 (Tuple)\r\n元组使用小括号 `()`，元素不可修改。\r\n\r\n```python\r\nmenu_tuple = (\&quot;汉堡\&quot;,)  # 单元素元组末尾需要加逗号\r\nprint(menu_tuple[0])\r\n```\r\n\r\n### 4. 字典 (Dictionary)\r\n字典使用花括号 `{}`，存储键值对 `key:value`。\r\n\r\n```python\r\nmenu = {\&quot;汉堡\&quot;: 20, \&quot;薯条\&quot;: 10, \&quot;可乐\&quot;: 9}\r\n\r\n# 常用操作\r\nmenu[\&quot;鸡米花\&quot;] = 12      # 增加键值对\r\ndel menu[\&quot;可乐\&quot;]         # 删除键值对\r\nmenu[\&quot;汉堡\&quot;] = 18        # 修改值\r\n```\r\n\r\n### 5. 集合 (Set)\r\n集合使用 `set()` 创建，元素不重复。\r\n\r\n```python\r\nmenu_set1 = set([\&quot;汉堡\&quot;, \&quot;薯条\&quot;, \&quot;可乐\&quot;, \&quot;可乐\&quot;])  # 自动去重\r\n\r\n# 集合运算\r\nmenu_set1 &amp; menu_set2    # 交集\r\nmenu_set1 | menu_set2    # 并集\r\nmenu_set1 - menu_set2    # 差集\r\n```\r\n\r\n---\r\n\r\n## 流程控制\r\n\r\n### 1. 条件控制语句 (if-elif-else)\r\n\r\n```python\r\nweek_day = input(\&quot;星期几？\\n\&quot;)\r\n\r\nif week_day == \&quot;4\&quot; and customer_input == menu[0]:\r\n    print(f\&quot;今日为疯狂星期四，汉堡价格2折\&quot;)\r\nelif week_day == \&quot;5\&quot; or customer_input == menu[0]:\r\n    print(f\&quot;今日为疯狂星期五，汉堡价格8折\&quot;)\r\nelse:\r\n    print(f\&quot;价格为{menu[1]}元\&quot;)\r\n```\r\n\r\n**逻辑运算符：**\r\n- `and`：同时满足条件\r\n- `or`：满足任一条件\r\n- `not`：取反\r\n\r\n### 2. 循环语句\r\n\r\n#### for 循环\r\n```python\r\n# 遍历列表\r\nmenu_list = [\&quot;汉堡\&quot;, \&quot;薯条\&quot;, \&quot;可乐\&quot;]\r\nfor menu in menu_list:\r\n    print(menu)\r\n\r\n# 遍历字典\r\nmenu_dict = {\&quot;汉堡\&quot;: 20, \&quot;薯条\&quot;: 10, \&quot;可乐\&quot;: 9}\r\nfor menu, price in menu_dict.items():\r\n    print(f\&quot;{menu}: {price}元\&quot;)\r\n\r\n# 使用range\r\nfor i in range(len(menu_list)):\r\n    print(menu_list[i])\r\n```\r\n\r\n#### while 循环\r\n```python\r\ni = 0\r\nwhile i &lt; len(menu_list):\r\n    print(menu_list[i])\r\n    i += 1\r\n```\r\n\r\n#### 循环控制\r\n```python\r\n# break - 终止循环\r\nfor menu in menu_list:\r\n    if menu == \&quot;薯条\&quot;:\r\n        break\r\n\r\n# continue - 跳过当前迭代\r\nfor menu in menu_list:\r\n    if menu == \&quot;薯条\&quot;:\r\n        continue\r\n    print(menu)\r\n```\r\n\r\n---\r\n\r\n## 函数\r\n\r\n### 1. 函数定义\r\n\r\n```python\r\ndef judge_week_day(week_day):\r\n    \&quot;\&quot;\&quot;\r\n    判断输入是否为有效的星期几\r\n    参数:\r\n        week_day (str): 需要判断的星期字符串\r\n    返回:\r\n        bool: 如果输入是有效的星期几则返回True\r\n    \&quot;\&quot;\&quot;\r\n    week_day_list = [\&quot;星期1\&quot;, \&quot;星期2\&quot;, \&quot;星期3\&quot;, \&quot;星期4\&quot;, \&quot;星期5\&quot;, \&quot;星期6\&quot;, \&quot;星期7\&quot;]\r\n    if week_day not in week_day_list:\r\n        print(\&quot;错误\&quot;)\r\n        return False\r\n    else:\r\n        return True\r\n```\r\n\r\n### 2. 返回值\r\n\r\n```python\r\n# 无return语句，返回None\r\ndef func1():\r\n    print(\&quot;执行\&quot;)\r\n\r\n# return不跟值，返回None\r\ndef func2():\r\n    return\r\n\r\n# 返回单个值\r\ndef func3():\r\n    return True\r\n\r\n# 返回多个值（元组）\r\ndef func4():\r\n    return value1, value2\r\n```\r\n\r\n### 3. 参数类型\r\n\r\n```python\r\n# 默认参数\r\ndef judge_week_day(day, week_day=\&quot;星期1\&quot;):\r\n    pass\r\n\r\n# 位置参数调用\r\njudge_week_day(30, 1, \&quot;星期1\&quot;)\r\n\r\n# 关键字参数调用\r\njudge_week_day(month=1, day=30, week_day=\&quot;星期1\&quot;)\r\n```\r\n\r\n### 4. 迭代器和生成器\r\n\r\n#### 迭代器 (Iterator)\r\n```python\r\nmenu_list = [\&quot;汉堡\&quot;, \&quot;薯条\&quot;, \&quot;可乐\&quot;]\r\niter_menu_list = iter(menu_list)\r\n\r\nprint(next(iter_menu_list))  # 输出下一个值\r\nfor x in iter_menu_list:\r\n    print(x)\r\n```\r\n\r\n#### 生成器 (Generator)\r\n```python\r\ndef menu():\r\n    print(\&quot;欢迎\&quot;)\r\n    menu_list = [\&quot;汉堡\&quot;, \&quot;薯条\&quot;, \&quot;可乐\&quot;]\r\n    for m in menu_list:\r\n        print(\&quot;menu:\&quot;, m)\r\n        yield m\r\n        print(\&quot;下一个\&quot;)\r\n\r\nprint_menu = menu()\r\nprint(next(print_menu))  # 每次yield暂停，下次从暂停处继续\r\n```\r\n\r\n---\r\n\r\n## 面向对象编程\r\n\r\n### 1. 类的定义和使用\r\n\r\n```python\r\nclass WeekDay:\r\n    week_day_list = [\&quot;星期1\&quot;, \&quot;星期2\&quot;, \&quot;星期3\&quot;, \&quot;星期4\&quot;, \&quot;星期5\&quot;, \&quot;星期6\&quot;, \&quot;星期7\&quot;]\r\n    \r\n    def judge_week_day(self, week_day=\&quot;星期1\&quot;):\r\n        n = self.week_day_list.index(week_day)\r\n        return self.week_day_list[n - len(self.week_day_list) + 1]\r\n    \r\n    def menu(self):\r\n        return \&quot;薯条\&quot;\r\n\r\n# 使用类\r\nprint(WeekDay().week_day_list)\r\njudge1, judge2 = WeekDay().judge_week_day()\r\n```\r\n\r\n### 2. 初始化函数 __init__\r\n\r\n```python\r\nclass WeekDay:\r\n    def __init__(self, month, day):\r\n        self.week_day_list = [\&quot;星期1\&quot;, \&quot;星期2\&quot;, \&quot;星期3\&quot;, \&quot;星期4\&quot;, \&quot;星期5\&quot;, \&quot;星期6\&quot;, \&quot;星期7\&quot;]\r\n        self.month = month\r\n        self.day = day\r\n        print(\&quot;self.month:\&quot;, self.month)\r\n        print(\&quot;self.day:\&quot;, self.day)\r\n\r\n# 创建实例时自动调用__init__\r\njudge1, judge2 = WeekDay(12, 6).judge_week_day()\r\n```\r\n\r\n### 3. 类继承\r\n\r\n```python\r\nclass Monitor:  # 父类\r\n    def size(self):\r\n        print(\&quot;27寸\&quot;)\r\n    \r\n    def use(self):\r\n        print(\&quot;办公\&quot;)\r\n    \r\n    def color(self):\r\n        print(\&quot;黑色\&quot;)\r\n\r\nclass Screen:\r\n    def screen(self):\r\n        print(\&quot;LG\&quot;)\r\n\r\nclass Monitor32(Monitor, Screen):  # 多继承\r\n    def __init__(self):\r\n        self.price = 1999\r\n    \r\n    def weight(self):\r\n        print(\&quot;2.5kg\&quot;)\r\n    \r\n    def color(self):  # 重写父类方法\r\n        print(\&quot;白色\&quot;)\r\n\r\n# 使用\r\nMonitor32().use()    # 调用父类方法\r\nMonitor32().color()  # 调用重写的方法\r\n```\r\n\r\n---\r\n\r\n## 异常处理\r\n\r\n### 1. try-except 语句\r\n\r\n```python\r\ntry:\r\n    menu_list = [\&quot;汉堡\&quot;, \&quot;薯条\&quot;, \&quot;可乐\&quot;]\r\n    print(menu_list[3])  # 索引越界\r\nexcept ValueError as v:\r\n    print(\&quot;错误:\&quot;, v)\r\nexcept OSError as o:\r\n    print(\&quot;错误:\&quot;, o)\r\nexcept Exception as e:\r\n    print(\&quot;错误:\&quot;, e)\r\n```\r\n\r\n### 2. 完整异常处理结构\r\n\r\n```python\r\ntry:\r\n    menu_list = [\&quot;汉堡\&quot;, \&quot;薯条\&quot;, \&quot;可乐\&quot;]\r\n    print(menu_list[2])\r\nexcept Exception as e:\r\n    print(\&quot;错误:\&quot;, e)\r\nelse:\r\n    print(\&quot;执行完成\&quot;)  # 没有异常时执行\r\nfinally:\r\n    print(\&quot;不管成功失败，都要执行的部分\&quot;)\r\n```\r\n\r\n### 3. 手动抛出异常\r\n\r\n```python\r\ntry:\r\n    menu_list = [\&quot;汉堡\&quot;, \&quot;薯条\&quot;, \&quot;可乐\&quot;]\r\n    print(menu_list[3])\r\nexcept Exception as e:\r\n    print(\&quot;错误:\&quot;, e)\r\n    raise  # 重新抛出异常\r\n```\r\n\r\n---\r\n\r\n## 模块化编程\r\n\r\n### 1. 模块导入\r\n\r\n```python\r\n# 同一文件夹内导入\r\nfrom order_menu import Menu\r\nfrom judge import JudgeWeek\r\n\r\n# 不同包文件夹内调用\r\nfrom 文件夹名.order_menu import Menu\r\nfrom 文件夹名.judge import JudgeWeek\r\n```\r\n\r\n### 2. 模块结构\r\n- `order_menu.py`：定义 `Menu` 类，处理菜单逻辑\r\n- `judge.py`：定义 `JudgeWeek` 类，处理星期判断\r\n- `order.py`：主程序，整合各模块功能\r\n\r\n---\r\n\r\n## 实战项目：KFC点餐系统\r\n\r\n### 项目概述\r\n一个简单的命令行点餐系统，演示了Python基础知识的综合应用。\r\n\r\n### 功能特性\r\n1. 显示菜单和价格\r\n2. 输入验证（星期几）\r\n3. 根据星期几计算折扣\r\n   - 星期四：汉堡2折，其他5折\r\n   - 星期五：汉堡8折\r\n\r\n### 代码结构\r\n\r\n#### 1. judge.py - 星期判断模块\r\n```python\r\nclass JudgeWeek:\r\n    def judge_week_day(self, week_day_list):\r\n        week_day = input(\&quot;请输入星期几：\\n\&quot;)\r\n        print(\&quot;选择\&quot;, week_day)\r\n        if week_day not in week_day_list:\r\n            return False\r\n        else:\r\n            return week_day\r\n```\r\n\r\n#### 2. order_menu.py - 菜单处理模块\r\n```python\r\nclass Menu:\r\n    def order_menu(self, week_day, menu):\r\n        customer_input = input(\&quot;你想选择哪个？\\n\&quot;)\r\n        print(\&quot;你选择的是\&quot;, customer_input)\r\n        \r\n        # 根据选择计算价格\r\n        if customer_input == menu[0]:  # 汉堡\r\n            if week_day == \&quot;4\&quot;:\r\n                print(f\&quot;今日为疯狂星期四，汉堡价格2折，为{menu[1] * 0.2}元\&quot;)\r\n            elif week_day == \&quot;5\&quot;:\r\n                print(f\&quot;今日为疯狂星期五，汉堡价格8折，为{menu[1] * 0.8}元\&quot;)\r\n            else:\r\n                print(f\&quot;价格为{menu[1]}元\&quot;)\r\n        # ... 其他商品逻辑\r\n```\r\n\r\n#### 3. order.py - 主程序\r\n```python\r\nfrom order_menu import Menu\r\nfrom judge import JudgeWeek\r\n\r\ntitle = \&quot;欢迎使用肯德基点餐小程序\&quot;\r\nprint(title)\r\n\r\nmenu = [\&quot;汉堡\&quot;, 20, \&quot;薯条\&quot;, 10, \&quot;可乐\&quot;, 9]\r\n# 显示菜单\r\nprint(f\&quot;{menu[0]}:{menu[1]}元\&quot;)\r\nprint(f\&quot;{menu[2]}:{menu[3]}元\&quot;)\r\nprint(f\&quot;{menu[4]}:{menu[5]}元\&quot;)\r\n\r\nweek_day_list = [\&quot;1\&quot;, \&quot;2\&quot;, \&quot;3\&quot;, \&quot;4\&quot;, \&quot;5\&quot;, \&quot;6\&quot;, \&quot;7\&quot;]\r\nweek_day = JudgeWeek().judge_week_day(week_day_list)\r\nif week_day:\r\n    Menu().order_menu(week_day, menu)\r\n```\r\n\r\n### 运行流程\r\n1. 显示欢迎信息和菜单\r\n2. 用户输入星期几\r\n3. 验证输入是否有效\r\n4. 用户选择商品\r\n5. 根据星期几计算并显示最终价格\r\n\r\n---\r\n\r\n## 学习要点总结\r\n\r\n### 已掌握的知识点\r\n- ✅ Python基础语法（变量、注释、格式化）\r\n- ✅ 数据类型（字符串、数字、列表、元组、字典、集合）\r\n- ✅ 流程控制（if-else、for、while、break、continue）\r\n- ✅ 函数定义与使用（参数、返回值、默认参数）\r\n- ✅ 迭代器和生成器\r\n- ✅ 面向对象编程（类、对象、继承、方法重写）\r\n- ✅ 异常处理\r\n- ✅ 模块化编程\r\n\r\n### 关键快捷键\r\n| 快捷键 | 功能 |\r\n|--------|------|\r\n| Ctrl + / | 单行注释/取消注释 |\r\n| Ctrl + Alt + L | 代码自动格式化 |\r\n\r\n---\r\n\r\n# 接口自动化\r\n\r\n## 一、项目学习背景\r\n\r\n本项目 `trading_system_api_autotest` 是一个围绕电商后台管理系统接口展开的 Python 接口自动化学习项目。整个学习过程不仅覆盖了最基础的接口请求发送、响应断言，还逐步扩展到了配置管理、公共方法封装、登录态复用、数据库校验、pytest fixture 机制、参数化测试、Allure 报告标注等内容。\r\n\r\n---\r\n\r\n## 二、项目目录结构理解\r\n\r\n```text\r\ntrading_system_api_autotest/\r\n├── common/\r\n│   ├── common_requests.py\r\n│   ├── deal_with_response.py\r\n│   ├── login.py\r\n│   ├── mysql_operate.py\r\n│   ├── tools.py\r\n│   └── yaml_config.py\r\n├── config/\r\n│   └── environment.yaml\r\n├── img/\r\n├── labs/\r\n├── logs/\r\n├── report/\r\n├── testcases/\r\n│   ├── conftest.py\r\n│   └── admin/\r\n│       ├── auth/\r\n│       ├── comment/\r\n│       ├── goods/\r\n│       ├── storage/\r\n│       └── user/\r\n├── token_dir/\r\n└── 其他练习文件\r\n```\r\n\r\n这个目录结构已经体现了接口自动化项目比较典型的分层思想：\r\n\r\n- `common/`：放公共能力，避免重复造轮子\r\n- `config/`：放环境配置，方便统一维护\r\n- `testcases/`：放测试用例，按业务模块继续拆分\r\n- `token_dir/`：放登录态缓存，减少重复登录\r\n- `report/`：放测试报告结果\r\n- `labs/`：放日常练习代码\r\n\r\n---\r\n\r\n## 三、学习过程中的核心知识点总结\r\n\r\n## 1. 接口自动化的基本认知\r\n\r\n如何使用 Python 去模拟客户端调用 HTTP 接口。\r\n\r\n接口自动化的基本流程是：\r\n\r\n1. 准备请求地址\r\n2. 准备请求方法（GET / POST）\r\n3. 准备请求头、请求参数、请求体\r\n4. 发送请求\r\n5. 接收响应\r\n6. 对响应结果进行断言\r\n7. 在必要时结合数据库做结果校验\r\n\r\n实践，例如：\r\n\r\n- 登录接口\r\n- 商品列表接口\r\n- 商品创建接口\r\n- 用户列表接口\r\n\r\n---\r\n\r\n## 2. Requests 二次封装的学习\r\n\r\n项目中的 `common/common_requests.py` 是整个工程的重要基础模块。\r\n\r\n- 如何对 `requests` 进行二次封装\r\n- 如何统一管理 Session\r\n- 如何设置请求超时时间\r\n- 如何统一拼接基础 URL\r\n- 如何挂载 `HTTPAdapter` 实现失败重试\r\n- 如何封装 `get()`、`post()` 等公共请求方法\r\n\r\n这一部分的意义非常大，因为它体现了自动化项目中的“公共层封装思维”。\r\n\r\n### 你的收获\r\n\r\n- 不再每个测试里直接写一堆 `requests.get()`、`requests.post()`\r\n- 而是通过 `Requests` 类统一处理请求行为\r\n- 后续如果要加日志、重试、鉴权、统一异常处理，都可以集中在这一层做\r\n\r\n---\r\n\r\n## 3. 配置文件管理的学习\r\n\r\n项目中的 `config/environment.yaml` 和 `common/yaml_config.py` 学习了“配置与代码分离”的思想。\r\n\r\n### 你掌握的内容包括：\r\n\r\n- 使用 YAML 文件存放环境配置\r\n- 在配置中管理：\r\n  - 接口基础地址\r\n  - 用户名和密码\r\n  - MySQL 配置\r\n- 通过 `GetConf` 类统一读取配置\r\n- 将不同类型配置拆成方法读取，如：\r\n  - `get_env()`\r\n  - `get_url()`\r\n  - `get_mysql_config()`\r\n\r\n### 这一阶段的学习意义\r\n\r\n这比把账号密码、URL、数据库连接信息直接写死在测试代码里更规范。\r\n\r\n项目已经具备以下优点：\r\n\r\n- 配置集中管理\r\n- 修改环境时只改配置，不改测试逻辑\r\n- 公共模块可以直接复用配置内容\r\n- 后续可以进一步扩展成多环境切换\r\n\r\n理解“测试数据”和“测试逻辑”解耦。\r\n\r\n---\r\n\r\n## 4. 登录接口与 token 管理的学习\r\n\r\n接口自动化测试中，一个高频问题是：很多接口依赖登录态，不能每个用例都手动重复写登录逻辑。\r\n\r\n在这个项目里，需要学习两种重要能力：\r\n\r\n### 4.1 登录接口封装\r\n\r\n`common/login.py` 中把登录行为封装成了单独方法：\r\n\r\n- 自动从配置中读取账号密码\r\n- 调用登录接口\r\n- 返回响应对象\r\n\r\n这种做法的优点是：\r\n\r\n- 登录逻辑集中管理\r\n- 测试用例中不需要重复写登录请求\r\n- 登录接口变更时只改一个地方\r\n\r\n### 4.2 token 缓存机制\r\n\r\n`testcases/conftest.py` 中的 `token` fixture 又往前走了一步，加入了 token 缓存：\r\n\r\n- 先判断 `token_dir` 是否存在\r\n- 不存在则自动创建目录\r\n- 再判断当前用户 token 文件是否存在\r\n- 如果不存在，则调用登录接口获取 token 并写入 JSON 文件\r\n- 如果已存在，则直接从本地 JSON 文件中读取 token\r\n\r\n### 这一阶段真正学到的东西\r\n\r\n不只是学会“拿到 token”，而是开始理解：\r\n\r\n- 如何在自动化项目中复用登录态\r\n- 如何避免重复请求登录接口\r\n- 如何用文件缓存减少不必要的接口调用\r\n- 如何通过 pytest fixture 管理共享资源\r\n\r\n---\r\n\r\n## 5. pytest fixture 机制的学习\r\n\r\n`conftest.py` 是 pytest 中非常关键的文件，在这个项目里已经接触到了它的核心作用。\r\n\r\n### 学到的要点\r\n\r\n- `conftest.py` 文件名固定，pytest 会自动识别\r\n- fixture 可以跨测试文件共享\r\n- fixture 可以返回函数，形成更灵活的调用方式\r\n- fixture 可以管理公共前置数据\r\n- fixture 可以通过 `yield` 返回资源\r\n\r\n例如在这个项目里：\r\n\r\n- `token()` fixture：负责提供登录态\r\n- `get_username_from_db()` fixture：负责提供数据库中的用户名\r\n\r\n### 你还实际排查过 fixture 的典型问题\r\n\r\n在这个项目里，学习过程中还遇到了一个非常典型的问题：\r\n\r\n- 测试文件中自定义了同名 fixture，覆盖了 `conftest.py` 中的 fixture\r\n- 调用 `token()` 时，因参数设计不一致导致报错\r\n- `login()` 函数参数和 `conftest.py` 调用方式不匹配导致报错\r\n\r\n这一类问题非常有价值，因为它真正理解了：\r\n\r\n- pytest fixture 的就近原则\r\n- fixture 命名冲突的问题\r\n- 公共方法定义与调用必须保持一致\r\n\r\n---\r\n\r\n## 6. 断言能力的学习\r\n\r\n自动化测试的核心不是“调接口成功”，而是“验证接口结果是否符合预期”。\r\n\r\n从这个项目的用例可以看出，已经掌握了基础断言方式：\r\n\r\n```python\r\nassert res.json()[\&quot;errno\&quot;] == 0\r\nassert res.json()[\&quot;errmsg\&quot;] == \&quot;成功\&quot;\r\n```\r\n\r\n### 在做的事情\r\n\r\n- 断言响应业务码\r\n- 断言响应提示信息\r\n- 提取响应中的关键字段进行业务校验\r\n\r\n例如用户列表接口中，已经判断接口成功，还提取了：\r\n\r\n- 接口返回的用户名\r\n- 数据库查询得到的用户名\r\n- 再做最终比对\r\n\r\n---\r\n\r\n## 7. 数据库校验的学习\r\n\r\n在 `common/mysql_operate.py` 和 `testcases/admin/user/list/test_mysql_conn.py` 中，已经学习到了接口自动化非常重要的一项能力：数据库校验。\r\n\r\n### 在掌握的内容包括：\r\n\r\n- 使用 `pymysql` 连接 MySQL\r\n- 读取 YAML 中的数据库配置\r\n- 封装数据库连接、查询、提交、关闭操作\r\n- 执行查询 SQL\r\n- 提取数据库结果\r\n- 将数据库结果和接口返回结果进行比对\r\n\r\n### 这一部分的学习价值\r\n\r\n这说明已经向“接口 + 数据层联合校验”迈进。\r\n\r\n因为很多接口测试不能只看接口返回的文案，还要验证：\r\n\r\n- 数据是否真的写入数据库\r\n- 数据库中的值是否和接口返回一致\r\n- 接口是否正确地反映底层数据状态\r\n\r\n---\r\n\r\n## 8. 参数化测试的学习\r\n\r\n在 `testcases/admin/goods/test_add_create.py` 中，已经通过 `@pytest.mark.parametrize` 学习了参数化测试。\r\n\r\n### 在掌握的点\r\n\r\n- 准备多个商品测试数据\r\n- 将数据放入 `goods_info_list`\r\n- 使用参数化让同一个测试逻辑跑多组数据\r\n- 避免重复写多个高度相似的测试函数\r\n\r\n### 参数化带来的好处\r\n\r\n- 提高测试覆盖率\r\n- 减少重复代码\r\n- 测试数据与测试逻辑分离更清晰\r\n- 更适合后续扩展成数据驱动测试\r\n\r\n---\r\n\r\n## 9. 测试用例分层与业务分类能力\r\n\r\n项目的 `testcases` 目录已经按业务进行了分类：\r\n\r\n- `admin/auth/`：登录相关\r\n- `admin/goods/`：商品相关\r\n- `admin/comment/`：评论相关\r\n- `admin/storage/`：文件上传相关\r\n- `admin/user/`：用户相关\r\n\r\n这种组织方式的好处是：\r\n\r\n- 结构清晰\r\n- 方便查找用例\r\n- 方便后期持续扩展\r\n- 更接近真实团队项目的组织方式\r\n\r\n---\r\n\r\n## 10. Allure 报告标注的学习\r\n\r\n从多个测试文件中可以看到已经使用 Allure 注解，例如：\r\n\r\n- `@allure.description`\r\n- `@allure.epic`\r\n- `@allure.feature`\r\n- `@allure.story`\r\n- `@allure.tag`\r\n- `with allure.step()`\r\n\r\n### 这说明已经学会了：\r\n\r\n- 给测试报告增加业务语义\r\n- 用步骤划分测试过程\r\n- 让报告结果更容易阅读\r\n- 让测试结果更适合展示和汇报\r\n\r\n---\r\n\r\n## 11. 文件上传、图片资源与接口扩展练习\r\n\r\n项目中还包含：\r\n\r\n- `img/` 图片目录\r\n- 上传图片相关测试文件\r\n- 下载文件相关测试代码\r\n\r\n这说明已经不仅仅停留在普通的 JSON 接口测试，还开始接触：\r\n\r\n- 文件上传接口\r\n- 文件下载接口\r\n- 非纯文本请求场景\r\n\r\n---\r\n\r\n## 12. 从练习代码到工程代码的过渡\r\n\r\n项目中存在 `labs/`、`pytest_0-1.py`、`test_api_0-1.py` 等学习型文件，这体现出一个非常真实的学习过程：\r\n\r\n- 先在零散脚本中练基础语法和单点功能\r\n- 再逐步把能力沉淀到 `common/` 公共模块中\r\n- 再把测试代码迁移到 `testcases/` 目录中统一管理\r\n- 再进一步引入配置、fixture、数据库校验、报告标注\r\n\r\n---\r\n\r\n## 四、核心文件学习总结\r\n\r\n## 1. common/common_requests.py\r\n\r\n这个文件是“请求封装层”。\r\n\r\n已经学会了：\r\n\r\n- Session 的使用\r\n- 请求重试机制\r\n- GET/POST 方法统一封装\r\n- 公共请求头的使用\r\n- URL 拼接\r\n- 超时时间控制\r\n\r\n它是后续所有接口测试的基础能力提供者。\r\n\r\n## 2. common/yaml_config.py\r\n\r\n这个文件是“配置读取层”。\r\n\r\n已经学会了：\r\n\r\n- 读取 YAML 文件\r\n- 获取 URL、账号密码、数据库配置\r\n- 将配置文件转化为 Python 可调用对象\r\n\r\n它让项目配置管理更加规范。\r\n\r\n## 3. common/login.py\r\n\r\n这个文件是“登录能力封装层”。\r\n\r\n已经学会了：\r\n\r\n- 将常用登录接口抽离成公共方法\r\n- 统一管理登录请求\r\n- 为 token 复用提供基础能力\r\n\r\n## 4. common/mysql_operate.py\r\n\r\n这个文件是“数据库操作层”。\r\n\r\n已经学会了：\r\n\r\n- 连接数据库\r\n- 执行查询和更新\r\n- 提交事务\r\n- 关闭连接\r\n- 将数据库结果用于测试断言\r\n\r\n## 5. testcases/conftest.py\r\n\r\n这个文件是“pytest 公共资源管理层”。\r\n\r\n已经学会了：\r\n\r\n- fixture 的定义与共享\r\n- token 的本地缓存机制\r\n- 数据库前置数据的封装\r\n- conftest 的作用范围和自动发现机制\r\n\r\n## 6. testcases/admin/goods/test_get_list.py\r\n\r\n这个文件体现的是“带鉴权的 GET 请求测试”。\r\n\r\n已经学会了：\r\n\r\n- 调用 token fixture 获取登录态\r\n- 组装请求头\r\n- 调用商品列表接口\r\n- 对接口结果做断言\r\n- 结合 Allure 做测试步骤划分\r\n\r\n## 7. testcases/admin/goods/test_add_create.py\r\n\r\n这个文件体现的是“参数化 POST 请求测试”。\r\n\r\n已经学会了：\r\n\r\n- 构造复杂 JSON 请求体\r\n- 使用参数化执行多组测试\r\n- 验证商品创建接口\r\n\r\n## 8. testcases/admin/auth/test_login.py\r\n\r\n这个文件体现的是“最基础的登录接口调用练习”。\r\n\r\n已经学会了：\r\n\r\n- 最简单的接口调用与返回打印\r\n- token 字段的提取方法\r\n\r\n## 9. testcases/admin/user/list/test_mysql_conn.py\r\n\r\n这个文件体现的是“接口结果与数据库结果联合校验”。\r\n\r\n已经学会了：\r\n\r\n- 获取接口中的用户信息\r\n- 获取数据库中的用户信息\r\n- 做最终一致性断言\r\n\r\n---\r\n\r\n## 五、本阶段学习中的典型成长点\r\n\r\n结合整个项目，可以总结出已经完成了以下成长：\r\n\r\n### 1. 从单接口调用成长为项目化测试\r\n\r\n已经不只是会调用某一个接口，而是能把多个接口按模块组织起来。\r\n\r\n### 2. 从写死数据成长为配置化管理\r\n\r\n已经学会把 URL、账号、数据库连接信息放到配置文件里。\r\n\r\n### 3. 从重复登录成长为 token 复用\r\n\r\n已经理解了登录态缓存和共享资源复用的重要性。\r\n\r\n### 4. 从简单断言成长为数据库联合校验\r\n\r\n已经不再满足于只断言返回码，而是开始做更真实的业务验证。\r\n\r\n### 5. 从手写重复用例成长为参数化测试\r\n\r\n已经开始学习如何提高测试覆盖率和代码复用率。\r\n\r\n### 6. 从只关心运行结果成长为关注测试报告展示\r\n\r\n已经开始使用 Allure 组织测试报告，提高测试结果可读性。\r\n\r\n### 7. 从写代码成长为会排查问题\r\n\r\n已经真实经历并解决了 fixture 覆盖、参数不一致、token 缓存逻辑等问题。\r\n\r\n---\r\n\r\n## 六、当前项目中已经体现出的自动化测试思想\r\n\r\n通过这个项目，已经初步具备了以下自动化测试思想：\r\n\r\n- 公共能力封装\r\n- 配置与逻辑分离\r\n- 测试数据复用\r\n- 登录态复用\r\n- 用例按业务模块分层\r\n- 接口断言与数据库断言结合\r\n- 测试报告可视化\r\n- 测试代码可维护性提升\r\n\r\n---\r\n\r\n## 七、当前项目仍可继续优化的方向\r\n\r\n虽然这个项目已经完成了较完整的一轮学习，但从工程化角度看，后面还可以继续进阶。\r\n\r\n### 1. 测试数据进一步解耦\r\n\r\n目前部分测试数据仍直接写在 Python 文件中，后续可以考虑：\r\n\r\n- 使用 YAML / JSON / Excel 管理测试数据\r\n- 实现更完整的数据驱动测试\r\n\r\n### 2. token 缓存机制进一步增强\r\n\r\n目前 token 是按 JSON 文件缓存的，后续可以继续优化：\r\n\r\n- 判断 token 是否过期\r\n- 失效后自动重新登录\r\n- 支持多角色用户 token 管理\r\n\r\n### 3. 日志体系完善\r\n\r\n目前项目里有 `logs/` 目录，但日志体系还可以继续完善，例如：\r\n\r\n- 请求日志\r\n- 响应日志\r\n- 异常日志\r\n- SQL 日志\r\n\r\n### 4. 断言能力增强\r\n\r\n后续可以继续学习：\r\n\r\n- JSON 结构断言\r\n- 字段类型断言\r\n- 响应时间断言\r\n- 更通用的断言封装\r\n\r\n### 5. 前后置处理增强\r\n\r\n后续可以补充：\r\n\r\n- 更丰富的 fixture 层级设计\r\n- 用例执行前后的数据库清理\r\n- 测试数据自动准备与回收\r\n\r\n### 6. CI 集成\r\n\r\n如果继续进阶，可以尝试把 pytest + Allure 接入持续集成环境，例如：\r\n\r\n- Jenkins\r\n- GitHub Actions\r\n- GitLab CI\r\n\r\n这样项目就从“本地学习项目”走向“可持续执行的自动化工程”。\r\n\r\n---\r\n\r\n## 八、本次学习的最终总结\r\n\r\n通过 `trading_system_api_autotest` 这个项目，已经完成了接口自动化测试从入门到初步工程化的一次完整实践。\r\n\r\n不仅学习了：\r\n\r\n- Python 调接口\r\n- pytest 编写测试\r\n- requests 二次封装\r\n- YAML 配置管理\r\n- token 获取与缓存\r\n- fixture 共享资源\r\n- 数据库查询与接口校验\r\n- 参数化测试\r\n- Allure 报告标注\r\n\r\n还在实际排错过程中真正理解了：\r\n\r\n- fixture 的作用域和覆盖规则\r\n- 公共方法调用参数一致性\r\n- 项目结构拆分的意义\r\n- 自动化测试代码维护性的核心思想\r\n\r\n---\r\n\r\n## 九、后续学习建议\r\n\r\n继续沿着下面几个方向深入：\r\n\r\n1. 深入学习 pytest 高级特性\r\n   - fixture 作用域\r\n   - fixture 依赖\r\n   - hook 函数\r\n   - mark 标记管理\r\n\r\n2. 深入学习接口自动化框架设计\r\n   - 数据驱动\r\n   - 断言封装\r\n   - 日志封装\r\n   - 失败截图或结果归档\r\n\r\n3. 学习更多复杂接口场景\r\n   - 文件上传\r\n   - 文件下载\r\n   - 签名接口\r\n   - 鉴权链路\r\n   - 分页、筛选、排序等复杂查询\r\n\r\n4. 深入学习数据库校验与测试数据管理\r\n   - 测试前准备数据\r\n   - 测试后清理数据\r\n   - 多表联合校验\r\n\r\n5. 学习持续集成与自动化执行\r\n   - 定时执行 pytest\r\n   - 自动生成 Allure 报告\r\n   - 自动通知测试结果\r\n\r\n---\r\n\r\n\r\n*文档生成时间：2026-05-10*&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/Python学习总结.md&quot;],&quot;assetImports&quot;:[1,[[0,&quot;@assets/uploads/wallhaven-213yem.png&quot;]]],&quot;digest&quot;:[0,&quot;626ae0d4b6e6c8f2&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;h1 id=\&quot;python-基础\&quot;&gt;Python 基础&lt;/h1&gt;\n&lt;h2 id=\&quot;目录\&quot;&gt;目录&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;a href=\&quot;#%E9%A1%B9%E7%9B%AE%E7%BB%93%E6%9E%84\&quot;&gt;项目结构&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;#%E5%9F%BA%E7%A1%80%E8%AF%AD%E6%B3%95\&quot;&gt;基础语法&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;#%E6%95%B0%E6%8D%AE%E7%B1%BB%E5%9E%8B\&quot;&gt;数据类型&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;#%E6%B5%81%E7%A8%8B%E6%8E%A7%E5%88%B6\&quot;&gt;流程控制&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;#%E5%87%BD%E6%95%B0\&quot;&gt;函数&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;#%E9%9D%A2%E5%90%91%E5%AF%B9%E8%B1%A1%E7%BC%96%E7%A8%8B\&quot;&gt;面向对象编程&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;#%E5%BC%82%E5%B8%B8%E5%A4%84%E7%90%86\&quot;&gt;异常处理&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;#%E6%A8%A1%E5%9D%97%E5%8C%96%E7%BC%96%E7%A8%8B\&quot;&gt;模块化编程&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;#%E5%AE%9E%E6%88%98%E9%A1%B9%E7%9B%AEkfc%E7%82%B9%E9%A4%90%E7%B3%BB%E7%BB%9F\&quot;&gt;实战项目：KFC点餐系统&lt;/a&gt;&lt;/li&gt;\n&lt;/ol&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;项目结构\&quot;&gt;项目结构&lt;/h2&gt;\n&lt;pre class=\&quot;astr h3&gt;\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;快捷键&lt;/th&gt;&lt;th&gt;功能&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&lt;tr&gt;&lt;td&gt;Ctrl + /&lt;/td&gt;&lt;td&gt;单行注释/取消注释&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Ctrl + Alt + L&lt;/td&gt;&lt;td&gt;代码自动格式化&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;\n&lt;hr&gt;\n&lt;h1 id=\&quot;接口自动化\&quot;&gt;接口自动化&lt;/h1&gt;\n&lt;h2 id=\&quot;一项目学习背景\&quot;&gt;一、项目学习背景&lt;/h2&gt;\n&lt;p&gt;本项目 &lt;code&gt;trading_system_api_autotest&lt;/code&gt; 是一个围绕电商后台管理系统接口展开的 Python 接口自动化学习项目。整个学习过程不仅覆盖了最基础的接口请求发送、响应断言，还逐步扩展到了配置管理、公共方法封装、登录态复用、数据库校验、pytest fixture 机制、参数化测试、Allure 报告标注等内容。&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;二项目目录结构理解\&quot;&gt;二、项目目录结构理解&lt;/h2&gt;\n&lt;pre class=\&quot;astro-code astro-code-themes github-light github-dark-dimmed\&quot; style=\&quot;background-color:#fff;--shiki-dark-bg:#22272e;color:#24292e;--shiki-dark:#adbac7; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;text\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;trading_system_api_autotest/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;├── common/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│   ├── common_requests.py&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│   ├── deal_with_response.py&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│   ├── login.py&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│   ├── mysql_operate.py&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│   ├── tools.py&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│   └── yaml_config.py&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;├── config/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│   └── environment.yaml&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;├── img/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;├── labs/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;├── logs/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;├── report/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;├── testcases/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│   ├── conftest.py&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│   └── admin/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│       ├── auth/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│       ├── comment/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│       ├── goods/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│       ├── storage/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;│       └── user/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;├── token_dir/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;└── 其他练习文件&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;这个目录结构已经体现了接口自动化项目比较典型的分层思想：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;common/&lt;/code&gt;：放公共能力，避免重复造轮子&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;config/&lt;/code&gt;：放环境配置，方便统一维护&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;testcases/&lt;/code&gt;：放测试用例，按业务模块继续拆分&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;token_dir/&lt;/code&gt;：放登录态缓存，减少重复登录&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;report/&lt;/code&gt;：放测试报告结果&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;labs/&lt;/code&gt;：放日常练习代码&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;三学习过程中的核心知识点总结\&quot;&gt;三、学习过程中的核心知识点总结&lt;/h2&gt;\n&lt;h2 id=\&quot;1-接口自动化的基本认知\&quot;&gt;1. 接口自动化的基本认知&lt;/h2&gt;\n&lt;p&gt;如何使用 Python 去模拟客户端调用 HTTP 接口。&lt;/p&gt;\n&lt;p&gt;接口自动化的基本流程是：&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;准备请求地址&lt;/li&gt;\n&lt;li&gt;准备请求方法（GET / POST）&lt;/li&gt;\n&lt;li&gt;准备请求头、请求参数、请求体&lt;/li&gt;\n&lt;li&gt;发送请求&lt;/li&gt;\n&lt;li&gt;接收响应&lt;/li&gt;\n&lt;li&gt;对响应结果进行断言&lt;/li&gt;\n&lt;li&gt;在必要时结合数据库做结果校验&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;实践，例如：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;登录接口&lt;/li&gt;\n&lt;li&gt;商品列表接口&lt;/li&gt;\n&lt;li&gt;商品创建接口&lt;/li&gt;\n&lt;li&gt;用户列表接口&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;2-requests-二次封装的学习\&quot;&gt;2. Requests 二次封装的学习&lt;/h2&gt;\n&lt;p&gt;项目中的 &lt;code&gt;common/common_requests.py&lt;/code&gt; 是整个工程的重要基础模块。&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;如何对 &lt;code&gt;requests&lt;/code&gt; 进行二次封装&lt;/li&gt;\n&lt;li&gt;如何统一管理 Session&lt;/li&gt;\n&lt;li&gt;如何设置请求超时时间&lt;/li&gt;\n&lt;li&gt;如何统一拼接基础 URL&lt;/li&gt;\n&lt;li&gt;如何挂载 &lt;code&gt;HTTPAdapter&lt;/code&gt; 实现失败重试&lt;/li&gt;\n&lt;li&gt;如何封装 &lt;code&gt;get()&lt;/code&gt;、&lt;code&gt;post()&lt;/code&gt; 等公共请求方法&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;这一部分的意义非常大，因为它体现了自动化项目中的“公共层封装思维”。&lt;/p&gt;\n&lt;h3 id=\&quot;你的收获\&quot;&gt;你的收获&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;不再每个测试里直接写一堆 &lt;code&gt;requests.get()&lt;/code&gt;、&lt;code&gt;requests.post()&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;而是通过 &lt;code&gt;Requests&lt;/code&gt; 类统一处理请求行为&lt;/li&gt;\n&lt;li&gt;后续如果要加日志、重试、鉴权、统一异常处理，都可以集中在这一层做&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;3-配置文件管理的学习\&quot;&gt;3. 配置文件管理的学习&lt;/h2&gt;\n&lt;p&gt;项目中的 &lt;code&gt;config/environment.yaml&lt;/code&gt; 和 &lt;code&gt;common/yaml_config.py&lt;/code&gt; 学习了“配置与代码分离”的思想。&lt;/p&gt;\n&lt;h3 id=\&quot;你掌握的内容包括\&quot;&gt;你掌握的内容包括：&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;使用 YAML 文件存放环境配置&lt;/li&gt;\n&lt;li&gt;在配置中管理：\n&lt;ul&gt;\n&lt;li&gt;接口基础地址&lt;/li&gt;\n&lt;li&gt;用户名和密码&lt;/li&gt;\n&lt;li&gt;MySQL 配置&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;通过 &lt;code&gt;GetConf&lt;/code&gt; 类统一读取配置&lt;/li&gt;\n&lt;li&gt;将不同类型配置拆成方法读取，如：\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;get_env()&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;get_url()&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;get_mysql_config()&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;这一阶段的学习意义\&quot;&gt;这一阶段的学习意义&lt;/h3&gt;\n&lt;p&gt;这比把账号密码、URL、数据库连接信息直接写死在测试代码里更规范。&lt;/p&gt;\n&lt;p&gt;项目已经具备以下优点：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;配置集中管理&lt;/li&gt;\n&lt;li&gt;修改环境时只改配置，不改测试逻辑&lt;/li&gt;\n&lt;li&gt;公共模块可以直接复用配置内容&lt;/li&gt;\n&lt;li&gt;后续可以进一步扩展成多环境切换&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;理解“测试数据”和“测试逻辑”解耦。&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;4-登录接口与-token-管理的学习\&quot;&gt;4. 登录接口与 token 管理的学习&lt;/h2&gt;\n&lt;p&gt;接口自动化测试中，一个高频问题是：很多接口依赖登录态，不能每个用例都手动重复写登录逻辑。&lt;/p&gt;\n&lt;p&gt;在这个项目里，需要学习两种重要能力：&lt;/p&gt;\n&lt;h3 id=\&quot;41-登录接口封装\&quot;&gt;4.1 登录接口封装&lt;/h3&gt;\n&lt;p&gt;&lt;code&gt;common/login.py&lt;/code&gt; 中把登录行为封装成了单独方法：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;自动从配置中读取账号密码&lt;/li&gt;\n&lt;li&gt;调用登录接口&lt;/li&gt;\n&lt;li&gt;返回响应对象&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;这种做法的优点是：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;登录逻辑集中管理&lt;/li&gt;\n&lt;li&gt;测试用例中不需要重复写登录请求&lt;/li&gt;\n&lt;li&gt;登录接口变更时只改一个地方&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;42-token-缓存机制\&quot;&gt;4.2 token 缓存机制&lt;/h3&gt;\n&lt;p&gt;&lt;code&gt;testcases/conftest.py&lt;/code&gt; 中的 &lt;code&gt;token&lt;/code&gt; fixture 又往前走了一步，加入了 token 缓存：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;先判断 &lt;code&gt;token_dir&lt;/code&gt; 是否存在&lt;/li&gt;\n&lt;li&gt;不存在则自动创建目录&lt;/li&gt;\n&lt;li&gt;再判断当前用户 token 文件是否存在&lt;/li&gt;\n&lt;li&gt;如果不存在，则调用登录接口获取 token 并写入 JSON 文件&lt;/li&gt;\n&lt;li&gt;如果已存在，则直接从本地 JSON 文件中读取 token&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;这一阶段真正学到的东西\&quot;&gt;这一阶段真正学到的东西&lt;/h3&gt;\n&lt;p&gt;不只是学会“拿到 token”，而是开始理解：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;如何在自动化项目中复用登录态&lt;/li&gt;\n&lt;li&gt;如何避免重复请求登录接口&lt;/li&gt;\n&lt;li&gt;如何用文件缓存减少不必要的接口调用&lt;/li&gt;\n&lt;li&gt;如何通过 pytest fixture 管理共享资源&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;5-pytest-fixture-机制的学习\&quot;&gt;5. pytest fixture 机制的学习&lt;/h2&gt;\n&lt;p&gt;&lt;code&gt;conftest.py&lt;/code&gt; 是 pytest 中非常关键的文件，在这个项目里已经接触到了它的核心作用。&lt;/p&gt;\n&lt;h3 id=\&quot;学到的要点\&quot;&gt;学到的要点&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;conftest.py&lt;/code&gt; 文件名固定，pytest 会自动识别&lt;/li&gt;\n&lt;li&gt;fixture 可以跨测试文件共享&lt;/li&gt;\n&lt;li&gt;fixture 可以返回函数，形成更灵活的调用方式&lt;/li&gt;\n&lt;li&gt;fixture 可以管理公共前置数据&lt;/li&gt;\n&lt;li&gt;fixture 可以通过 &lt;code&gt;yield&lt;/code&gt; 返回资源&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;例如在这个项目里：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;token()&lt;/code&gt; fixture：负责提供登录态&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;get_username_from_db()&lt;/code&gt; fixture：负责提供数据库中的用户名&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;你还实际排查过-fixture-的典型问题\&quot;&gt;你还实际排查过 fixture 的典型问题&lt;/h3&gt;\n&lt;p&gt;在这个项目里，学习过程中还遇到了一个非常典型的问题：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;测试文件中自定义了同名 fixture，覆盖了 &lt;code&gt;conftest.py&lt;/code&gt; 中的 fixture&lt;/li&gt;\n&lt;li&gt;调用 &lt;code&gt;token()&lt;/code&gt; 时，因参数设计不一致导致报错&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;login()&lt;/code&gt; 函数参数和 &lt;code&gt;conftest.py&lt;/code&gt; 调用方式不匹配导致报错&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;这一类问题非常有价值，因为它真正理解了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;pytest fixture 的就近原则&lt;/li&gt;\n&lt;li&gt;fixture 命名冲突的问题&lt;/li&gt;\n&lt;li&gt;公共方法定义与调用必须保持一致&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;6-断言能力的学习\&quot;&gt;6. 断言能力的学习&lt;/h2&gt;\n&lt;p&gt;自动化测试的核心不是“调接口成功”，而是“验证接口结果是否符合预期”。&lt;/p&gt;\n&lt;p&gt;从这个项目的用例可以看出，已经掌握了基础断言方式：&lt;/p&gt;\n&lt;pre class=\&quot;astro-code astro-code-themes github-light github-dark-dimmed\&quot; style=\&quot;background-color:#fff;--shiki-dark-bg:#22272e;color:#24292e;--shiki-dark:#adbac7; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;python\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#D73A49;--shiki-dark:#F47067\&quot;&gt;assert&lt;/span&gt;&lt;span style=\&quot;color:#24292E;--shiki-dark:#ADBAC7\&quot;&gt; res.json()[&lt;/span&gt;&lt;span style=\&quot;color:#032F62;--shiki-dark:#96D0FF\&quot;&gt;\&quot;errno\&quot;&lt;/span&gt;&lt;span style=\&quot;color:#24292E;--shiki-dark:#ADBAC7\&quot;&gt;] &lt;/span&gt;&lt;span style=\&quot;color:#D73A49;--shiki-dark:#F47067\&quot;&gt;==&lt;/span&gt;&lt;span style=\&quot;color:#005CC5;--shiki-dark:#6CB6FF\&quot;&gt; 0&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#D73A49;--shiki-dark:#F47067\&quot;&gt;assert&lt;/span&gt;&lt;span style=\&quot;color:#24292E;--shiki-dark:#ADBAC7\&quot;&gt; res.json()[&lt;/span&gt;&lt;span style=\&quot;color:#032F62;--shiki-dark:#96D0FF\&quot;&gt;\&quot;errmsg\&quot;&lt;/span&gt;&lt;span style=\&quot;color:#24292E;--shiki-dark:#ADBAC7\&quot;&gt;] &lt;/span&gt;&lt;span style=\&quot;color:#D73A49;--shiki-dark:#F47067\&quot;&gt;==&lt;/span&gt;&lt;span style=\&quot;color:#032F62;--shiki-dark:#96D0FF\&quot;&gt; \&quot;成功\&quot;&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&quot;在做的事情\&quot;&gt;在做的事情&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;断言响应业务码&lt;/li&gt;\n&lt;li&gt;断言响应提示信息&lt;/li&gt;\n&lt;li&gt;提取响应中的关键字段进行业务校验&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;例如用户列表接口中，已经判断接口成功，还提取了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;接口返回的用户名&lt;/li&gt;\n&lt;li&gt;数据库查询得到的用户名&lt;/li&gt;\n&lt;li&gt;再做最终比对&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;7-数据库校验的学习\&quot;&gt;7. 数据库校验的学习&lt;/h2&gt;\n&lt;p&gt;在 &lt;code&gt;common/mysql_operate.py&lt;/code&gt; 和 &lt;code&gt;testcases/admin/user/list/test_mysql_conn.py&lt;/code&gt; 中，已经学习到了接口自动化非常重要的一项能力：数据库校验。&lt;/p&gt;\n&lt;h3 id=\&quot;在掌握的内容包括\&quot;&gt;在掌握的内容包括：&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;使用 &lt;code&gt;pymysql&lt;/code&gt; 连接 MySQL&lt;/li&gt;\n&lt;li&gt;读取 YAML 中的数据库配置&lt;/li&gt;\n&lt;li&gt;封装数据库连接、查询、提交、关闭操作&lt;/li&gt;\n&lt;li&gt;执行查询 SQL&lt;/li&gt;\n&lt;li&gt;提取数据库结果&lt;/li&gt;\n&lt;li&gt;将数据库结果和接口返回结果进行比对&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;这一部分的学习价值\&quot;&gt;这一部分的学习价值&lt;/h3&gt;\n&lt;p&gt;这说明已经向“接口 + 数据层联合校验”迈进。&lt;/p&gt;\n&lt;p&gt;因为很多接口测试不能只看接口返回的文案，还要验证：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;数据是否真的写入数据库&lt;/li&gt;\n&lt;li&gt;数据库中的值是否和接口返回一致&lt;/li&gt;\n&lt;li&gt;接口是否正确地反映底层数据状态&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;8-参数化测试的学习\&quot;&gt;8. 参数化测试的学习&lt;/h2&gt;\n&lt;p&gt;在 &lt;code&gt;testcases/admin/goods/test_add_create.py&lt;/code&gt; 中，已经通过 &lt;code&gt;@pytest.mark.parametrize&lt;/code&gt; 学习了参数化测试。&lt;/p&gt;\n&lt;h3 id=\&quot;在掌握的点\&quot;&gt;在掌握的点&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;准备多个商品测试数据&lt;/li&gt;\n&lt;li&gt;将数据放入 &lt;code&gt;goods_info_list&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;使用参数化让同一个测试逻辑跑多组数据&lt;/li&gt;\n&lt;li&gt;避免重复写多个高度相似的测试函数&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;参数化带来的好处\&quot;&gt;参数化带来的好处&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;提高测试覆盖率&lt;/li&gt;\n&lt;li&gt;减少重复代码&lt;/li&gt;\n&lt;li&gt;测试数据与测试逻辑分离更清晰&lt;/li&gt;\n&lt;li&gt;更适合后续扩展成数据驱动测试&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;9-测试用例分层与业务分类能力\&quot;&gt;9. 测试用例分层与业务分类能力&lt;/h2&gt;\n&lt;p&gt;项目的 &lt;code&gt;testcases&lt;/code&gt; 目录已经按业务进行了分类：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;admin/auth/&lt;/code&gt;：登录相关&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;admin/goods/&lt;/code&gt;：商品相关&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;admin/comment/&lt;/code&gt;：评论相关&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;admin/storage/&lt;/code&gt;：文件上传相关&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;admin/user/&lt;/code&gt;：用户相关&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;这种组织方式的好处是：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;结构清晰&lt;/li&gt;\n&lt;li&gt;方便查找用例&lt;/li&gt;\n&lt;li&gt;方便后期持续扩展&lt;/li&gt;\n&lt;li&gt;更接近真实团队项目的组织方式&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;10-allure-报告标注的学习\&quot;&gt;10. Allure 报告标注的学习&lt;/h2&gt;\n&lt;p&gt;从多个测试文件中可以看到已经使用 Allure 注解，例如：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;@allure.description&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;@allure.epic&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;@allure.feature&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;@allure.story&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;@allure.tag&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;with allure.step()&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;这说明已经学会了\&quot;&gt;这说明已经学会了：&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;给测试报告增加业务语义&lt;/li&gt;\n&lt;li&gt;用步骤划分测试过程&lt;/li&gt;\n&lt;li&gt;让报告结果更容易阅读&lt;/li&gt;\n&lt;li&gt;让测试结果更适合展示和汇报&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;11-文件上传图片资源与接口扩展练习\&quot;&gt;11. 文件上传、图片资源与接口扩展练习&lt;/h2&gt;\n&lt;p&gt;项目中还包含：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;img/&lt;/code&gt; 图片目录&lt;/li&gt;\n&lt;li&gt;上传图片相关测试文件&lt;/li&gt;\n&lt;li&gt;下载文件相关测试代码&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;这说明已经不仅仅停留在普通的 JSON 接口测试，还开始接触：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;文件上传接口&lt;/li&gt;\n&lt;li&gt;文件下载接口&lt;/li&gt;\n&lt;li&gt;非纯文本请求场景&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;12-从练习代码到工程代码的过渡\&quot;&gt;12. 从练习代码到工程代码的过渡&lt;/h2&gt;\n&lt;p&gt;项目中存在 &lt;code&gt;labs/&lt;/code&gt;、&lt;code&gt;pytest_0-1.py&lt;/code&gt;、&lt;code&gt;test_api_0-1.py&lt;/code&gt; 等学习型文件，这体现出一个非常真实的学习过程：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;先在零散脚本中练基础语法和单点功能&lt;/li&gt;\n&lt;li&gt;再逐步把能力沉淀到 &lt;code&gt;common/&lt;/code&gt; 公共模块中&lt;/li&gt;\n&lt;li&gt;再把测试代码迁移到 &lt;code&gt;testcases/&lt;/code&gt; 目录中统一管理&lt;/li&gt;\n&lt;li&gt;再进一步引入配置、fixture、数据库校验、报告标注&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;四核心文件学习总结\&quot;&gt;四、核心文件学习总结&lt;/h2&gt;\n&lt;h2 id=\&quot;1-commoncommon_requestspy\&quot;&gt;1. common/common_requests.py&lt;/h2&gt;\n&lt;p&gt;这个文件是“请求封装层”。&lt;/p&gt;\n&lt;p&gt;已经学会了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Session 的使用&lt;/li&gt;\n&lt;li&gt;请求重试机制&lt;/li&gt;\n&lt;li&gt;GET/POST 方法统一封装&lt;/li&gt;\n&lt;li&gt;公共请求头的使用&lt;/li&gt;\n&lt;li&gt;URL 拼接&lt;/li&gt;\n&lt;li&gt;超时时间控制&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;它是后续所有接口测试的基础能力提供者。&lt;/p&gt;\n&lt;h2 id=\&quot;2-commonyaml_configpy\&quot;&gt;2. common/yaml_config.py&lt;/h2&gt;\n&lt;p&gt;这个文件是“配置读取层”。&lt;/p&gt;\n&lt;p&gt;已经学会了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;读取 YAML 文件&lt;/li&gt;\n&lt;li&gt;获取 URL、账号密码、数据库配置&lt;/li&gt;\n&lt;li&gt;将配置文件转化为 Python 可调用对象&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;它让项目配置管理更加规范。&lt;/p&gt;\n&lt;h2 id=\&quot;3-commonloginpy\&quot;&gt;3. common/login.py&lt;/h2&gt;\n&lt;p&gt;这个文件是“登录能力封装层”。&lt;/p&gt;\n&lt;p&gt;已经学会了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;将常用登录接口抽离成公共方法&lt;/li&gt;\n&lt;li&gt;统一管理登录请求&lt;/li&gt;\n&lt;li&gt;为 token 复用提供基础能力&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&quot;4-commonmysql_operatepy\&quot;&gt;4. common/mysql_operate.py&lt;/h2&gt;\n&lt;p&gt;这个文件是“数据库操作层”。&lt;/p&gt;\n&lt;p&gt;已经学会了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;连接数据库&lt;/li&gt;\n&lt;li&gt;执行查询和更新&lt;/li&gt;\n&lt;li&gt;提交事务&lt;/li&gt;\n&lt;li&gt;关闭连接&lt;/li&gt;\n&lt;li&gt;将数据库结果用于测试断言&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&quot;5-testcasesconftestpy\&quot;&gt;5. testcases/conftest.py&lt;/h2&gt;\n&lt;p&gt;这个文件是“pytest 公共资源管理层”。&lt;/p&gt;\n&lt;p&gt;已经学会了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;fixture 的定义与共享&lt;/li&gt;\n&lt;li&gt;token 的本地缓存机制&lt;/li&gt;\n&lt;li&gt;数据库前置数据的封装&lt;/li&gt;\n&lt;li&gt;conftest 的作用范围和自动发现机制&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&quot;6-testcasesadmingoodstest_get_listpy\&quot;&gt;6. testcases/admin/goods/test_get_list.py&lt;/h2&gt;\n&lt;p&gt;这个文件体现的是“带鉴权的 GET 请求测试”。&lt;/p&gt;\n&lt;p&gt;已经学会了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;调用 token fixture 获取登录态&lt;/li&gt;\n&lt;li&gt;组装请求头&lt;/li&gt;\n&lt;li&gt;调用商品列表接口&lt;/li&gt;\n&lt;li&gt;对接口结果做断言&lt;/li&gt;\n&lt;li&gt;结合 Allure 做测试步骤划分&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&quot;7-testcasesadmingoodstest_add_createpy\&quot;&gt;7. testcases/admin/goods/test_add_create.py&lt;/h2&gt;\n&lt;p&gt;这个文件体现的是“参数化 POST 请求测试”。&lt;/p&gt;\n&lt;p&gt;已经学会了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;构造复杂 JSON 请求体&lt;/li&gt;\n&lt;li&gt;使用参数化执行多组测试&lt;/li&gt;\n&lt;li&gt;验证商品创建接口&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&quot;8-testcasesadminauthtest_loginpy\&quot;&gt;8. testcases/admin/auth/test_login.py&lt;/h2&gt;\n&lt;p&gt;这个文件体现的是“最基础的登录接口调用练习”。&lt;/p&gt;\n&lt;p&gt;已经学会了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;最简单的接口调用与返回打印&lt;/li&gt;\n&lt;li&gt;token 字段的提取方法&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&quot;9-testcasesadminuserlisttest_mysql_connpy\&quot;&gt;9. testcases/admin/user/list/test_mysql_conn.py&lt;/h2&gt;\n&lt;p&gt;这个文件体现的是“接口结果与数据库结果联合校验”。&lt;/p&gt;\n&lt;p&gt;已经学会了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;获取接口中的用户信息&lt;/li&gt;\n&lt;li&gt;获取数据库中的用户信息&lt;/li&gt;\n&lt;li&gt;做最终一致性断言&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;五本阶段学习中的典型成长点\&quot;&gt;五、本阶段学习中的典型成长点&lt;/h2&gt;\n&lt;p&gt;结合整个项目，可以总结出已经完成了以下成长：&lt;/p&gt;\n&lt;h3 id=\&quot;1-从单接口调用成长为项目化测试\&quot;&gt;1. 从单接口调用成长为项目化测试&lt;/h3&gt;\n&lt;p&gt;已经不只是会调用某一个接口，而是能把多个接口按模块组织起来。&lt;/p&gt;\n&lt;h3 id=\&quot;2-从写死数据成长为配置化管理\&quot;&gt;2. 从写死数据成长为配置化管理&lt;/h3&gt;\n&lt;p&gt;已经学会把 URL、账号、数据库连接信息放到配置文件里。&lt;/p&gt;\n&lt;h3 id=\&quot;3-从重复登录成长为-token-复用\&quot;&gt;3. 从重复登录成长为 token 复用&lt;/h3&gt;\n&lt;p&gt;已经理解了登录态缓存和共享资源复用的重要性。&lt;/p&gt;\n&lt;h3 id=\&quot;4-从简单断言成长为数据库联合校验\&quot;&gt;4. 从简单断言成长为数据库联合校验&lt;/h3&gt;\n&lt;p&gt;已经不再满足于只断言返回码，而是开始做更真实的业务验证。&lt;/p&gt;\n&lt;h3 id=\&quot;5-从手写重复用例成长为参数化测试\&quot;&gt;5. 从手写重复用例成长为参数化测试&lt;/h3&gt;\n&lt;p&gt;已经开始学习如何提高测试覆盖率和代码复用率。&lt;/p&gt;\n&lt;h3 id=\&quot;6-从只关心运行结果成长为关注测试报告展示\&quot;&gt;6. 从只关心运行结果成长为关注测试报告展示&lt;/h3&gt;\n&lt;p&gt;已经开始使用 Allure 组织测试报告，提高测试结果可读性。&lt;/p&gt;\n&lt;h3 id=\&quot;7-从写代码成长为会排查问题\&quot;&gt;7. 从写代码成长为会排查问题&lt;/h3&gt;\n&lt;p&gt;已经真实经历并解决了 fixture 覆盖、参数不一致、token 缓存逻辑等问题。&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;六当前项目中已经体现出的自动化测试思想\&quot;&gt;六、当前项目中已经体现出的自动化测试思想&lt;/h2&gt;\n&lt;p&gt;通过这个项目，已经初步具备了以下自动化测试思想：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;公共能力封装&lt;/li&gt;\n&lt;li&gt;配置与逻辑分离&lt;/li&gt;\n&lt;li&gt;测试数据复用&lt;/li&gt;\n&lt;li&gt;登录态复用&lt;/li&gt;\n&lt;li&gt;用例按业务模块分层&lt;/li&gt;\n&lt;li&gt;接口断言与数据库断言结合&lt;/li&gt;\n&lt;li&gt;测试报告可视化&lt;/li&gt;\n&lt;li&gt;测试代码可维护性提升&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;七当前项目仍可继续优化的方向\&quot;&gt;七、当前项目仍可继续优化的方向&lt;/h2&gt;\n&lt;p&gt;虽然这个项目已经完成了较完整的一轮学习，但从工程化角度看，后面还可以继续进阶。&lt;/p&gt;\n&lt;h3 id=\&quot;1-测试数据进一步解耦\&quot;&gt;1. 测试数据进一步解耦&lt;/h3&gt;\n&lt;p&gt;目前部分测试数据仍直接写在 Python 文件中，后续可以考虑：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;使用 YAML / JSON / Excel 管理测试数据&lt;/li&gt;\n&lt;li&gt;实现更完整的数据驱动测试&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;2-token-缓存机制进一步增强\&quot;&gt;2. token 缓存机制进一步增强&lt;/h3&gt;\n&lt;p&gt;目前 token 是按 JSON 文件缓存的，后续可以继续优化：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;判断 token 是否过期&lt;/li&gt;\n&lt;li&gt;失效后自动重新登录&lt;/li&gt;\n&lt;li&gt;支持多角色用户 token 管理&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;3-日志体系完善\&quot;&gt;3. 日志体系完善&lt;/h3&gt;\n&lt;p&gt;目前项目里有 &lt;code&gt;logs/&lt;/code&gt; 目录，但日志体系还可以继续完善，例如：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;请求日志&lt;/li&gt;\n&lt;li&gt;响应日志&lt;/li&gt;\n&lt;li&gt;异常日志&lt;/li&gt;\n&lt;li&gt;SQL 日志&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;4-断言能力增强\&quot;&gt;4. 断言能力增强&lt;/h3&gt;\n&lt;p&gt;后续可以继续学习：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;JSON 结构断言&lt;/li&gt;\n&lt;li&gt;字段类型断言&lt;/li&gt;\n&lt;li&gt;响应时间断言&lt;/li&gt;\n&lt;li&gt;更通用的断言封装&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;5-前后置处理增强\&quot;&gt;5. 前后置处理增强&lt;/h3&gt;\n&lt;p&gt;后续可以补充：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;更丰富的 fixture 层级设计&lt;/li&gt;\n&lt;li&gt;用例执行前后的数据库清理&lt;/li&gt;\n&lt;li&gt;测试数据自动准备与回收&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;6-ci-集成\&quot;&gt;6. CI 集成&lt;/h3&gt;\n&lt;p&gt;如果继续进阶，可以尝试把 pytest + Allure 接入持续集成环境，例如：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Jenkins&lt;/li&gt;\n&lt;li&gt;GitHub Actions&lt;/li&gt;\n&lt;li&gt;GitLab CI&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;这样项目就从“本地学习项目”走向“可持续执行的自动化工程”。&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;八本次学习的最终总结\&quot;&gt;八、本次学习的最终总结&lt;/h2&gt;\n&lt;p&gt;通过 &lt;code&gt;trading_system_api_autotest&lt;/code&gt; 这个项目，已经完成了接口自动化测试从入门到初步工程化的一次完整实践。&lt;/p&gt;\n&lt;p&gt;不仅学习了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Python 调接口&lt;/li&gt;\n&lt;li&gt;pytest 编写测试&lt;/li&gt;\n&lt;li&gt;requests 二次封装&lt;/li&gt;\n&lt;li&gt;YAML 配置管理&lt;/li&gt;\n&lt;li&gt;token 获取与缓存&lt;/li&gt;\n&lt;li&gt;fixture 共享资源&lt;/li&gt;\n&lt;li&gt;数据库查询与接口校验&lt;/li&gt;\n&lt;li&gt;参数化测试&lt;/li&gt;\n&lt;li&gt;Allure 报告标注&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;还在实际排错过程中真正理解了：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;fixture 的作用域和覆盖规则&lt;/li&gt;\n&lt;li&gt;公共方法调用参数一致性&lt;/li&gt;\n&lt;li&gt;项目结构拆分的意义&lt;/li&gt;\n&lt;li&gt;自动化测试代码维护性的核心思想&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&quot;九后续学习建议\&quot;&gt;九、后续学习建议&lt;/h2&gt;\n&lt;p&gt;继续沿着下面几个方向深入：&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;深入学习 pytest 高级特性&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;fixture 作用域&lt;/li&gt;\n&lt;li&gt;fixture 依赖&lt;/li&gt;\n&lt;li&gt;hook 函数&lt;/li&gt;\n&lt;li&gt;mark 标记管理&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;深入学习接口自动化框架设计&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;数据驱动&lt;/li&gt;\n&lt;li&gt;断言封装&lt;/li&gt;\n&lt;li&gt;日志封装&lt;/li&gt;\n&lt;li&gt;失败截图或结果归档&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;学习更多复杂接口场景&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;文件上传&lt;/li&gt;\n&lt;li&gt;文件下载&lt;/li&gt;\n&lt;li&gt;签名接口&lt;/li&gt;\n&lt;li&gt;鉴权链路&lt;/li&gt;\n&lt;li&gt;分页、筛选、排序等复杂查询&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;深入学习数据库校验与测试数据管理&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;测试前准备数据&lt;/li&gt;\n&lt;li&gt;测试后清理数据&lt;/li&gt;\n&lt;li&gt;多表联合校验&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;学习持续集成与自动化执行&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;定时执行 pytest&lt;/li&gt;\n&lt;li&gt;自动生成 Allure 报告&lt;/li&gt;\n&lt;li&gt;自动通知测试结果&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;hr&gt;\n&lt;p&gt;&lt;em&gt;文档生成时间：2026-05-10&lt;/em&gt;&lt;/p&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[[0,{&quot;depth&quot;:[0,1],&quot;slug&quot;:[0,&quot;python-基础&quot;],&quot;text&quot;:[0,&quot;Python 基础&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;目录&quot;],&quot;text&quot;:[0,&quot;目录&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;项目结构&quot;],&quot;text&quot;:[0,&quot;项目结构&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;基础语法&quot;],&quot;text&quot;:[0,&quot;基础语法&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;1-打印输出&quot;],&quot;text&quot;:[0,&quot;1. 打印输出&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;2-注释&quot;],&quot;text&quot;:[0,&quot;2. 注释&quot;]}],[0,{&quot;depth&quot;:[0,3],&
